name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest --tb=short -q

  build:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: BPE-macOS
          - os: windows-latest
            artifact: BPE-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller installer/bpe.spec

      - name: Ad-hoc codesign (macOS)
        if: runner.os == 'macOS'
        run: codesign --force --deep -s - dist/BPE.app

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "BPE" \
            --volicon "installer/icon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "BPE.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "BPE.app" \
            --no-internet-enable \
            "${{ matrix.artifact }}.dmg" \
            "dist/BPE.app" || \
          (cd dist && zip -r ../${{ matrix.artifact }}.zip BPE.app && cd ..)

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\BPE.exe -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
          generate_release_notes: true
